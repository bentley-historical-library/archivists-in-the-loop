# ============================================================
# Hugo configuration — umich-base-accessible theme
# Replace baseURL with your GitHub Pages URL before deploying
# ============================================================

baseURL = "https://bentley-historical-library.github.io/archivists-in-the-loop/"
languageCode = "en-us"
title = "Archivists in the Loop"
theme = "umich-base-accessible"

# Paginate list pages
paginate = 10

# GitHub Pages uses ugly URLs by default; this keeps clean /page/ paths
uglyURLs = false
relativeURLs = false

[params]
  description = "Archivists in the Loop: A symposium on archival reference services in the generative AI moment"

  # Social site preview logo (place file in static/ and do not precede with a slash)
  ogImage = "images/basic-ai-symposium-graphic.png"


  # Path to header logo (place file in static/)
  # logo = "/images/site-logo.png"

  # Path to a separate (lighter) footer logo
  # footerLogo = "/images/site-logo-footer.png"

  # Text or HTML shown in the footer above the copyright line
  footerText = "Archivists in the Loop is sponsored by the Bentley Historical Library and the University of Michigan School of Information"
  copyrightHolder = "Regents of the University of Michigan"

  # Favicon (place file in static/)
  favicon = "/favicon.ico"

  # Set to true to show a "Recent Posts" block on the homepage
  showRecentPosts = true

  # Hero banner on the homepage
  [params.hero]
    heading    = "Archivists in the Loop"
    subheading = "A symposium on archival reference services in the generative AI moment"
    color      = "red"
    heroImage  = "images/basic-ai-symposium-graphic.png"
  #   [params.hero.cta]
  #     label = "Learn more"
  #     url   = "/about/"

  # Featured image carousel on the homepage.
  # Add one [[params.carousel.slides]] entry per image.
  # Set autoplay = false to disable auto-advancing.
  [params.carousel]
    autoplay         = true
    autoplayInterval = 5000   # milliseconds between slides

  # [[params.carousel.slides]]
  #   image   = "images/example-photo.jpg"
  #   alt     = "Descriptive alt text for the image"
  #   caption = "Optional caption displayed below the slide"
  [[params.carousel.slides]]
    image   = "images/archivists-in-the-loop-graphic-carousel1.jpg"
    alt     = "Graphic with the text Archivists in the Loop and an image of people working in an archival reading room."
  #  caption = "Symposium graphic created by Madeleine Bradford, Bentley Historical Library" 
  [[params.carousel.slides]]
    image   = "images/archivists-in-the-loop-graphic-carousel2.jpg"
    alt     = "Graphic with the text Archivists in the Loop and an image of people working in an archival reading room."
  #  caption = "Symposium graphic created by Madeleine Bradford, Bentley Historical Library" 
  [[params.carousel.slides]]
    image   = "images/archivists-in-the-loop-graphic-carousel3.jpg"
    alt     = "Graphic with the text Archivists in the Loop and an image of people working in an archival reading room."
  #  caption = "Symposium graphic created by Madeleine Bradford, Bentley Historical Library"
  [[params.carousel.slides]]
    image  = "images/basic-ai-symposium-graphic.png"
    alt    = "A graphic in blue and maize colors with the text Archivists in the Loop that is used as a visual identifier of the symposium."

# ------------------------------------------------------------
# Main navigation menu
# ------------------------------------------------------------
[menu]
  [[menu.main]]
    name       = "About"
    url        = "/about/"
    weight     = 10
  [[menu.main]]
    name       = "Participants"
    url        = "/participants/"
    weight     = 20
  [[menu.main]]
    name       = "Schedule"
    url        = "/schedule/"
    weight     = 30
  [[menu.main]]
    name       = "Updates"
    url        = "/updates/"
    weight     = 40

# Optional footer menu
# [[menu.footer]]
#   name   = "Contact"
#   url    = "/contact/"
#   weight = 10

# ------------------------------------------------------------
# Markup settings
# ------------------------------------------------------------
[markup]
  [markup.goldmark.renderer]
    unsafe = true   # allows raw HTML in Markdown content

  [markup.highlight]
    style = "monokai"

# ------------------------------------------------------------
# Build output for GitHub Pages
# ------------------------------------------------------------
[build]
  writeStats = false

[caches]
  [caches.images]
    dir = ':cacheDir/images'